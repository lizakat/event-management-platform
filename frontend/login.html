<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="public/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/static/login-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Вход</title> 
</head>
<body>
    <h2>Вход</h2>
    <div class="form-container">
        <div class="input-field">
            <label class="input-label" for="login-email">Enter your email</label>
            <input class="input" type="text" id="login-email" placeholder="kbpf1811@gmail.com" />
        </div>
        <div class="input-field">
            <label class="input-label" for="login-password">Enter your password</label>
            <input class="input" type="text" id="login-password" placeholder="qwerty1811" />
        </div>
        <div class="checkbox">
            <input type="checkbox" id="login-scales" name="login-scales" checked />
            <label for="login-scales">Remember me</label>
          </div>
        <button class="button">Log In</button>
        <div class="already-registered italic">
            <a href="forgot-password.html" class="forgot-password-link">Forgot password?</a>
        </div>
    </div>
    <script>
        document.querySelector('.button').addEventListener('click', function() {
            window.location.href = 'welcome.html';
        });
    </script>
</body>
</html>
