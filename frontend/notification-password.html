<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уведомление о сбросе пароля</title>
    <link rel="icon" href="public/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/static/notification-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Регистрация</title> 
</head>
<body>
    <form id="secondForgotPasswordForm">
        <div class="notification">
            <div class="stack">
                <div class="content">
                    <div class="reset-password">
                        <img src="src/static/notification-icon.svg" alt="Notification" class="notification-icon">
                        Reset password
                    </div>
                    <div class="description">An email will be sent with further instructions</div>
                </div>
                <button class="button">
                    <img src="src/static/arrow-left-icon.svg" alt="arrow-left" class="arrow-left-icon">
                    Back to Log In
                </button>
            </div>
        </div>
    </form>
    <script>
        document.querySelector('.button').addEventListener('click', function() {
            window.location.href = 'new-password.html';
        });
    </script>
</body>
</html>
