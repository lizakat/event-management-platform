<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="public/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/static/login-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Регистрация</title> 
</head>
<body>
    <form id="secondRegistrationForm">
        <h2>Регистрация</h2>
        <div class="form-container">
            <div class="input-field">
                <label class="input-label" for="register-email">Enter your email</label>
                <input class="input" type="email" id="register-email" placeholder="kbpf1811@gmail.com" />
            </div>
            <div class="input-field">
                <label class="input-label" for="register-password">Enter your password</label>
                <input class="input" type="password" id="register-password" placeholder="qwerty1811" />
            </div>
            <div class="input-field">
                <label class="input-label" for="register-confirm-password">Confirm password</label>
                <input class="input" type="password" id="register-confirm-password" placeholder="qwerty1811" />
            </div>
            <div class="resend-code">
                <input class="input half-size" type="text" id="register-code" placeholder="123456" />
                <button type="button" class="button-code" width=124>Resend code</button>
            </div>
            <button type="button" class="button" id="registerButton">Register</button>
            <div class="already-registered italic">
                <a href="login.html" class="login-link">Already registered? Log In</a>
            </div>        
        </div>
    </form>
    <script>
        // Получаем данные из URL
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const surname = urlParams.get('surname');
        const role_id = urlParams.get('role_id');

        document.getElementById('registerButton').addEventListener('click', function() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            const userData = {
                name: name,
                surname: surname,
                role_id: role_id,
                email: email,
                password: password,
            };

            // Отправляем данные на сервер
            fetch('/users/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(userData),
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                window.location.href = 'login.html';
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        });

        document.querySelector('.button-code').addEventListener('click', function() {
            // Логика для повторной отправки кода
            alert('Code resent!');
        });
    </script>
</body>
</html>
