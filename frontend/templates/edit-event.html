{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="/static/css/main-page-styles.css">
    <link rel="stylesheet" href="/static/css/event-styles.css">
{% endblock %}

{% block content %}
<div class="all">
    <div class="menu">
        <li><a href="/events/event/{{ event.id }}" class="menu-button home">Назад</a></li>
    </div>
    <div class="event">
        <h1>Редактировать мероприятие</h1>

        <form class="event-form" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Название</label>
                <input type="text" id="title" name="title" value="{{ event.title }}" required>
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" name="description">{{ event.description }}</textarea>
            </div>

            <div class="two-lines">
                <div class="form-group">
                    <label for="date">Дата</label>
                    <input type="date" id="date" name="date" value="{{ event.date }}" required>
                </div>

                <div class="form-group">
                    <label for="time">Время</label>
                    <input type="time" id="time" name="time" value="{{ event.time.strftime('%H:%M') }}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="location">Место проведения</label>
                <input type="text" id="location" name="location" value="{{ event.location.address if event.location }}">
            </div>

            <div class="two-lines">
                <div class="form-group">
                    <label for="max_participants">Макс. участников</label>
                    <input type="number" id="max_participants" name="max_participants" value="{{ event.max_participants }}">
                </div>

                <div class="form-group">
                    <label for="price">Цена (руб.)</label>
                    <input type="number" step="0.01" id="price" name="price" value="{{ event.price }}">
                </div>
            </div>

            <div class="form-group">
                <label for="image">Изображение</label>
                <input type="file" id="image" name="image" accept="image/*">
                {% if event.image %}
                    <p>Текущее изображение: {{ event.image }}</p>
                {% endif %}
            </div>

            <div class="form-group">
                <label>Категории</label>
                <div class="categories-container">
                    {% for category in all_categories %}
                    <div class="category-checkbox">
                        <input type="checkbox"
                               id="category-{{ category.id }}"
                               name="categories"
                               value="{{ category.id }}"
                               {% if category in event.categories %}checked{% endif %}>
                        <label for="category-{{ category.id }}">{{ category.name }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="button">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}
