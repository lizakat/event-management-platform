<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/public/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>{{ title }}</title>
    {% block styles %}{% endblock %}
</head>
<body>
    <div style="display: none;">
        DEBUG: current_page = {{ current_page }}
        DEBUG: request.path = {{ request.url.path }}
    </div>
    <div class="page-wrapper">
        <header class="navbar">
            <div class="logo">
              <a class="a-logo" href="/main-page">
                <img src="/public/favicon.ico" alt="">
                <h1>Even<span style="font-style: italic; font-family: var(--second-font-family)">ТЫ</span></h1>
              </a>
            </div>
            <ul class="menu-items">
                <li><a href="/favourite-events"><i class="far fa-heart"></i></a></li>
                <li><a href="/notifications"><i class="far fa-bell"></i></a></li>
                <li>
                    {% if current_page == 'profile' %}
                    <form action="/auth/logout" method="POST">
                        <button type="submit" class="logout-btn">
                            <i class="fa fa-sign-out-alt"></i>
                        </button>
                    </form>
                    {% else %}
                    <a href="/profile">
                        <i class="far fa-user"></i>
                    </a>
                    {% endif %}
                </li>
            </ul>
        </header>
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
        <footer class="footer">
            &copy; 2025 Все права защищены.
            <div>
                Остались вопросы? Напиши нам!
            </div>
            <ul class="menu-items">
                <li><a href="mailto:kbpf1811@gmail.com?subject=EventYou%20Application"><i class="far fa-envelope"></i></a></li>
                <li><a href="https://t.me/ktk_eliz"><i class="fab fa-telegram-plane"></i></a></li>
                <li><a href="https://www.instagram.com/ktk.elizaveta?igsh=MWYzdzM3dWc2cXdzbQ%3D%3D&utm_source=qr">
                    <i class="fab fa-instagram"></i></a></li>
            </ul>
        </footer>
    </div>
</body>
<script src="/static/js/script.js"></script>
<script src="/static/js/fav-script.js"></script>
<style>
.logout-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    color: inherit;
}
</style>
</html>
