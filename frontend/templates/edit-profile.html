{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="/static/css/profile-styles.css">
{% endblock %}

{% block content %}

<div class="all">
    <div class="menu">
        <li><a href="/profile" class="menu-button home">Назад</a></li>
    </div>

    <div class="profile">
        <hr style="margin-top: 0;">

        <form method="POST" action="/users/edit-profile" enctype="multipart/form-data">
            <div class="user-info">
                <div class="form-group">
                    <!-- Скрытый input для загрузки файла -->
                    <input type="file" id="avatar-upload" name="image" accept="image/*" style="display: none;">

                    <div class="avatar-container">
                        <!-- Кликабельный превью-аватар -->
                        <label for="avatar-upload" style="cursor: pointer;">
                            <img src="{{ user.avatar_url if user and user.avatar_url else '/static/images/avatar_1.jfif' }}"
                                 alt="Фото профиля"
                                 class="avatar-preview"
                                 id="avatar-preview">
                            <div class="change-photo-text">Изменить фото</div>
                        </label>
                    </div>
                </div>

                <div class="user-details">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" value="{{ user.name if user and user.name else '' }}" required>

                    <label for="surname">Фамилия</label>
                    <input type="text" id="surname" name="surname" value="{{ user.surname if user and user.surname else '' }}" required>

                    <label for="birthdate">Дата рождения</label>
                    <input type="date" id="birthdate" name="birthdate" value="{{ user.birthdate.strftime('%Y-%m-%d') if user and user.birthdate else '' }}" required>

                    <label for="phone">Моб. телефон</label>
                    <input type="tel" id="phone" name="phone" value="{{ user.phone if user and user.phone else '' }}">

                    <label for="location">Адрес</label>
                    <input type="text" id="location" name="location" value="{{ user.location if user and user.location else '' }}">
                </div>
            </div>

            <div class="favourite-tags">
                <h3>Любимые категории</h3>

                <div class="tags-checkboxes">
                    {% if all_tags %}
                        {% for tag in all_tags %}
                            <label>
                                <input type="checkbox" name="favorite_tags" value="{{ tag.name }}"
                                       {% if user and user.user_categories %}
                                           {% for user_tag in user.user_categories %}
                                               {% if user_tag.category and user_tag.category.name == tag.name %}checked{% endif %}
                                           {% endfor %}
                                       {% endif %}>
                                {{ tag.name }}
                            </label>
                        {% endfor %}
                    {% else %}
                        <p>Нет доступных категорий</p>
                    {% endif %}
                </div>
            </div>
            <button type="submit" class="save-btn">Сохранить</button>
        </form>
    </div>
</div>
<script>
document.getElementById('avatar-upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('avatar-preview').src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
