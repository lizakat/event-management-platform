{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="../static/css/event-styles.css">
{% endblock %}

{% block content %}
<div class="all">
    <div class="menu">
        <li title="home"><a href="/" class="menu-button home">Назад</a></li>
    </div>

    <div class="event">
        <h1 style="font-size:24px; margin-bottom: 24px;">Создание нового события</h1>

        <form method="post" enctype="multipart/form-data" class="event-form">
            <!-- Основная информация -->
            <div class="form-group">
                <label for="title">Название события*</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>

            <!-- Дата и время -->
            <div class="two-lines">
                <div class="form-group">
                    <label for="date">Дата*</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="time">Время*</label>
                    <input type="time" id="time" name="time" required>
                </div>
            </div>

            <!-- Местоположение -->
            <div class="form-group" style="position: relative;">
                <label for="address_search">Адрес</label>
                <input type="text" id="address_search" placeholder="Введите адрес..." autocomplete="off">
                <ul id="suggestions" style="position: absolute; z-index: 999;"></ul>
                <input type="hidden" name="location" id="location_json">
            </div>



            <!-- Участники и цена -->
            <div class="two-lines">
                <div class="form-group">
                    <label for="max_participants">Макс. участников</label>
                    <input type="number" id="max_participants" name="max_participants" min="1">
                </div>
                <div class="form-group">
                    <label for="price">Цена (руб)</label>
                    <input type="number" id="price" name="price" min="0" step="0.01">
                </div>
            </div>

            <!-- Изображение -->
            <div class="form-group">
                <label for="image">Изображение</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>

            <!-- Категории -->
            <div class="form-group">
                <label>Категории</label>
                <div class="categories-container">
                    {% for category in all_categories %}
                    <div class="category-checkbox">
                        <input type="checkbox" id="category_{{ category.id }}" name="categories" value="{{ category.id }}">
                        <label for="category_{{ category.id }}">{{ category.name }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="button">Создать событие</button>
        </form>
    </div>
</div>
<script>
const token = '4babb88d449ff1620f1de57474e5b1e43128930e';

const input = document.getElementById('address_search');
const suggestions = document.getElementById('suggestions');
const hiddenLocationInput = document.getElementById('location_json');

input.addEventListener('input', async () => {
    const query = input.value.trim();
    if (query.length < 3) {
        suggestions.innerHTML = '';
        return;
    }

    const response = await fetch("https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
            "Authorization": "Token " + token
        },
        body: JSON.stringify({
            query: query,
            count: 5,
            locations: [{ country: "*" }]
        })
    });

    const result = await response.json();

    suggestions.innerHTML = '';
    result.suggestions.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item.value;
        li.style.padding = '6px';
        li.style.cursor = 'pointer';
        li.style.borderBottom = '1px solid #eee';

        li.addEventListener('click', () => {
            input.value = item.value;

            // Извлекаем только нужные данные
            const locationData = {
                country: item.data.country,
                city: item.data.city,
                street: item.data.street,
                house: item.data.house,
                flat: item.data.flat
            };

            // Сохраняем только нужные данные в скрытое поле
            hiddenLocationInput.value = JSON.stringify(locationData);
            suggestions.innerHTML = '';
        });

        suggestions.appendChild(li);
    });
});
</script>


<style>
#suggestions {
    position: absolute;
    top: 100%; /* прямо под input */
    left: 0;
    z-index: 999;
    background-color: white;
    border: 1px solid #ccc;
    width: 100%;
    max-height: 200px;
    overflow-y: auto;
    margin-top: 2px;
    padding-left: 0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

#suggestions li {
    list-style: none;
    padding: 8px 12px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    color: black;
}

#suggestions li:hover {
    background-color: #f0f0f0;
}
</style>



{% endblock %}
