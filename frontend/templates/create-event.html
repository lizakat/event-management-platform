{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="../static/css/event-styles.css">
{% endblock %}

{% block content %}
<div class="all">
    <div class="menu">
        <li title="home"><a href="/" class="menu-button home">Назад</a></li>
    </div>

    <div class="event">
        <h1>Создание нового события</h1>

        <form method="post" enctype="multipart/form-data" class="event-form">
            <!-- Основная информация -->
            <div class="form-group">
                <label for="title">Название события*</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>

            <!-- Дата и время -->
            <div class="two-lines">
                <div class="form-group">
                    <label for="date">Дата*</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="time">Время*</label>
                    <input type="time" id="time" name="time" required>
                </div>
            </div>

            <!-- Местоположение -->
            <div class="form-group">
                <label for="location">Адрес</label>
                <input type="text" id="location" name="location">
            </div>

            <!-- Участники и цена -->
            <div class="two-lines">
                <div class="form-group">
                    <label for="max_participants">Макс. участников</label>
                    <input type="number" id="max_participants" name="max_participants" min="1">
                </div>
                <div class="form-group">
                    <label for="price">Цена (руб)</label>
                    <input type="number" id="price" name="price" min="0" step="0.01">
                </div>
            </div>

            <!-- Изображение -->
            <div class="form-group">
                <label for="image">Изображение</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>

            <!-- Категории -->
            <div class="form-group">
                <label>Категории</label>
                <div class="categories-container">
                    {% for category in all_categories %}
                    <div class="category-checkbox">
                        <input type="checkbox" id="category_{{ category.id }}" name="categories" value="{{ category.id }}">
                        <label for="category_{{ category.id }}">{{ category.name }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="button">Создать событие</button>
        </form>
    </div>
</div>
{% endblock %}
