{% extends "login-base.html" %}

{% block styles %}
    <link rel="stylesheet" href="../static/css/login-styles.css">
{% endblock %}

{% block content %}
    <form id="loginForm">
        <h2 class="second-font">Вход</h2>
        <div class="form-container">
            <div class="input-field">
                <label class="input-label" for="login-email">Enter your email</label>
                <input class="input" type="text" id="login-email" placeholder="kbpf1811@gmail.com" />
            </div>
            <div class="input-field">
                <label class="input-label" for="login-password">Enter your password</label>
                <input class="input" type="text" id="login-password" placeholder="qwerty1811" />
            </div>
            <div class="checkbox">
                <input type="checkbox" id="login-scales" name="login-scales" checked />
                <label for="login-scales">Remember me</label>
            </div>
            <button type="button" class="button">Log In</button>
            <div class="already-registered italic">
                <a href="/forgot-password" class="forgot-password-link">Forgot password?</a>
                <a href="/" class="forgot-password-link">Register</a>
            </div>
            <hr style="margin: 0; border-color: #D9D9D9">
            <div class="alternative-auth">
                <p style="font-style: italic">Войти с помощью</p>
                <img src="../static/images/icons/google-icon.svg" alt="Иконка" width="32" height="32" style="visibility: hidden">
                <img src="../static/images/icons/google-icon.svg" alt="Иконка" width="32" height="32">
                <img src="../static/images/icons/google-icon.svg" alt="Иконка" width="32" height="32"  style="visibility: hidden">
            </div>
        </div>
    </form>
    <script>
        document.querySelector('.button').addEventListener('click', function() {
            window.location.href = '/main-page';
        });
    </script>
{% endblock %}
