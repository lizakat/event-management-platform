<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="public/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/static/login-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Новый пароль</title> 
</head>
<body>
    <h2>Новый пароль</h2>
    <div class="form-container">
        <div class="input-field">
            <label class="input-label" for="new-password-label">Enter new password</label>
            <input class="input" type="text" id="new-password" placeholder="qwerty1234" />
        </div>
        <div class="input-field">
            <label class="input-label" for="repeat-new-password-label">Repeat password</label>
            <input class="input" type="text" id="repeat-new-password" placeholder="qwerty1234" />
        </div>
        <button class="button">Reset password</button>
    </div>
</body>
<script>
    document.querySelector('.button').addEventListener('click', function() {
        window.location.href = 'login.html';
    });
</script>
</html>
