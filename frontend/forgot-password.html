<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Забыли пароль</title> 
</head>
<body>
    <h2>Забыли пароль</h2>
    <div class="form-container">
        <div class="input-field">
            <label class="input-label" for="email-to-reset-password">Enter your email you used to register</label>
            <input class="input" type="text" id="email-to-reset-password" placeholder="kbpf1811@gmail.com" />
        </div>
        <div class="resend-code">
            <div class="already-registered italic half-size" for="cancel">
                <a href="login.html" for="cancel">Cancel</a>
            </div>         
            <button class="button" width=146>Reset password</button>
        </div>
    </div>
</body>
<script>
    document.querySelector('.button').addEventListener('click', function() {
        window.location.href = 'notification-password.html';
    });
</script>
